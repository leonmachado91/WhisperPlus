<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhisperLiveKit</title>
    <link rel="stylesheet" href="live_transcription.css" />
</head>

<body>
    <div class="header-container">
        <div class="main-controls">
            <div class="buttons-container">
                <button id="recordButton" title="Record (Global)">
                    <div class="shape-container">
                        <div class="shape"></div>
                    </div>
                    <div class="recording-info">
                        <div class="wave-container">
                            <canvas id="waveCanvas"></canvas>
                        </div>
                        <div class="timer">00:00</div>
                    </div>
                </button>

                <button id="pauseButton" title="Pause (Global)" disabled>
                    <img src="/web/src/pause.svg" alt="Pause" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23111\' width=\'24\' height=\'24\'><path d=\'M6 19h4V5H6v14zm8-14v14h4V5h-4z\'/></svg>'" />
                </button>

                <button id="settingsToggle" class="settings-toggle" title="Settings">
                    <img src="web/src/settings.svg" alt="Settings" />
                </button>
            </div>
        </div>

        <p id="status"></p>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content settings">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>

            <div class="settings-grid">
                <div class="field">
                    <label for="websocketInput">Websocket URL</label>
                    <input id="websocketInput" type="text" placeholder="ws://host:port/asr" />
                </div>

                <div class="field">
                    <label for="microphoneSelect">Microphone</label>
                    <select id="microphoneSelect">
                        <option value="">Default Microphone</option>
                    </select>
                </div>

                <div class="field checkbox-field">
                    <input type="checkbox" id="systemAudioToggle" />
                    <label for="systemAudioToggle">Capture System Audio (Mix)</label>
                </div>

                <div class="field">
                    <label for="modelSelect">Whisper Model</label>
                    <select id="modelSelect">
                        <option value="tiny">Tiny</option>
                        <option value="base">Base</option>
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large-v3">Large-v3</option>
                    </select>
                </div>

                <div class="field checkbox-field">
                    <input type="checkbox" id="diarizationToggle" />
                    <label for="diarizationToggle">Enable Diarization (Speaker ID)</label>
                </div>

                <div class="field">
                    <label for="modeSelect">Operation Mode</label>
                    <select id="modeSelect">
                        <option value="live">Live Transcription</option>
                        <option value="folder">Folder Watch Mode</option>
                    </select>
                </div>

                <div class="field">
                    <label for="outputFileInput">Output File Name</label>
                    <input id="outputFileInput" type="text" placeholder="e.g. session_1.txt" value="transcription_live.txt" />
                </div>

                <div class="field full-width">
                    <label for="initialPromptInput">Initial Prompt (Context / Jargon)</label>
                    <textarea id="initialPromptInput" placeholder="Enter terms separated by commas, e.g., RPG character names..." rows="3"></textarea>
                </div>

                <fieldset class="field full-width shortcuts-fieldset">
                    <legend>Global Shortcuts</legend>
                    <div class="shortcut-row">
                        <label for="shortcutRecord">Record/Stop:</label>
                        <input id="shortcutRecord" type="text" placeholder="Press a key..." readonly />
                        <button class="clear-shortcut" data-target="shortcutRecord" title="Clear Shortcut">&times;</button>
                    </div>
                    <div class="shortcut-row">
                        <label for="shortcutPause">Pause/Resume:</label>
                        <input id="shortcutPause" type="text" placeholder="Press a key..." readonly />
                        <button class="clear-shortcut" data-target="shortcutPause" title="Clear Shortcut">&times;</button>
                    </div>
                </fieldset>

                <div class="field full-width theme-selector-container">
                    <div class="segmented" role="radiogroup" aria-label="Theme selector">
                        <input type="radio" id="theme-system" name="theme" value="system" />
                        <label for="theme-system" title="System">
                            <img src="/web/src/system_mode.svg" alt="" />
                            <span>System</span>
                        </label>

                        <input type="radio" id="theme-light" name="theme" value="light" />
                        <label for="theme-light" title="Light">
                            <img src="/web/src/light_mode.svg" alt="" />
                            <span>Light</span>
                        </label>

                        <input type="radio" id="theme-dark" name="theme" value="dark" />
                        <label for="theme-dark" title="Dark">
                            <img src="/web/src/dark_mode.svg" alt="" />
                            <span>Dark</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="transcript-container">
        <div id="linesTranscript"></div>
    </div>

    <script src="live_transcription.js"></script>
</body>

</html>
